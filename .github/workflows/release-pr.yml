name: Prepare Release PR

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: release/develop-to-main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Fetch main and tags
        run: |
          git fetch origin main
          git fetch origin --tags

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release branch from main and merge develop
        run: |
          DEVELOP_SHA="$(git rev-parse HEAD)"
          git checkout -B "$RELEASE_BRANCH" origin/main

          if git merge "$DEVELOP_SHA" --no-commit --no-ff; then
            echo "Merged develop into release branch without conflicts."
          else
            conflicted_files="$(git diff --name-only --diff-filter=U || true)"
            if [ -z "$conflicted_files" ]; then
              echo "Merge failed without conflicted files." >&2
              exit 1
            fi

            for file in $conflicted_files; do
              case "$file" in
                CHANGELOG.md|kawori/version.py) ;;
                *)
                  echo "Release branch merge requires manual resolution for $file" >&2
                  exit 1
                  ;;
              esac
            done

            echo "Resetting release-controlled files to origin/main before recalculation."
          fi

          git restore --source=origin/main --staged --worktree CHANGELOG.md kawori/version.py

      - name: Prepare release files
        id: prepare
        run: python scripts/prepare_release.py --base-ref origin/main --head-ref HEAD --pr-body-file "$RUNNER_TEMP/release-pr-body.md"

      - name: Stop when no release is needed
        if: steps.prepare.outputs.release_needed != 'true'
        run: echo "No releasable changes found."

      - name: Commit and push release branch
        id: release_branch
        if: steps.prepare.outputs.release_needed == 'true'
        run: |
          git add kawori/version.py CHANGELOG.md
          if git diff --cached --quiet; then
            echo "branch_available=true" >> "$GITHUB_OUTPUT"
            echo "Release branch synced without additional file changes."
          else
            git commit -m "${{ steps.prepare.outputs.pr_title }}"
            echo "branch_available=true" >> "$GITHUB_OUTPUT"
          fi
          git push --force-with-lease origin "HEAD:${{ steps.prepare.outputs.branch_name }}"

      - name: Create or update pull request
        if: steps.prepare.outputs.release_needed == 'true' && steps.release_branch.outputs.branch_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_TITLE: ${{ steps.prepare.outputs.pr_title }}
          PR_BODY_FILE: ${{ steps.prepare.outputs.pr_body_file }}
          PR_BRANCH: ${{ steps.prepare.outputs.branch_name }}
        run: |
          branch_owner="${GITHUB_REPOSITORY%%/*}"
          existing_pr="$(gh pr list --repo "$GH_REPO" --base main --head "$branch_owner:$PR_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --repo "$GH_REPO" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          else
            gh pr create --repo "$GH_REPO" --base main --head "$PR_BRANCH" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          fi
