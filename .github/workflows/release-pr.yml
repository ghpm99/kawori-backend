name: Prepare Release PR

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Fetch main and tags
        run: |
          git fetch origin main
          git fetch origin --tags

      - name: Prepare release files
        id: prepare
        run: python scripts/prepare_release.py --base-ref origin/main --head-ref HEAD --pr-body-file "$RUNNER_TEMP/release-pr-body.md"

      - name: Stop when no release is needed
        if: steps.prepare.outputs.release_needed != 'true'
        run: echo "No releasable changes found."

      - name: Configure git identity
        if: steps.prepare.outputs.release_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push release branch
        id: release_branch
        if: steps.prepare.outputs.release_needed == 'true'
        run: |
          git checkout -B "${{ steps.prepare.outputs.branch_name }}"
          git add kawori/version.py CHANGELOG.md
          if git diff --cached --quiet; then
            git push --force-with-lease origin "HEAD:${{ steps.prepare.outputs.branch_name }}"
            echo "branch_available=true" >> "$GITHUB_OUTPUT"
            echo "Release branch synced to the current HEAD without additional file changes."
          else
            git commit -m "${{ steps.prepare.outputs.pr_title }}"
            git push --force-with-lease origin "HEAD:${{ steps.prepare.outputs.branch_name }}"
            echo "branch_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.prepare.outputs.release_needed == 'true' && steps.release_branch.outputs.branch_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_TITLE: ${{ steps.prepare.outputs.pr_title }}
          PR_BODY_FILE: ${{ steps.prepare.outputs.pr_body_file }}
          PR_BRANCH: ${{ steps.prepare.outputs.branch_name }}
        run: |
          branch_owner="${GITHUB_REPOSITORY%%/*}"
          existing_pr="$(gh pr list --repo "$GH_REPO" --base main --head "$branch_owner:$PR_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --repo "$GH_REPO" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          else
            gh pr create --repo "$GH_REPO" --base main --head "$PR_BRANCH" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          fi
