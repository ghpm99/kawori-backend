name: Backend CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort

      - name: Check formatting (black)
        run: black --check .

      - name: Check imports (isort)
        run: isort --check-only --profile black .

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (flake8)
        run: flake8 .

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Static security scan (bandit)
        run: bandit -r . -x ./.venv,./**/migrations -s B105,B106

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

  tests:
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - security

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kawori
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kawori"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: kawori.settings.test
      SECRET_KEY: ci-test-secret-key
      POSTGRES_DB: kawori
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_TEST_DB: test_kawori
      BASE_URL: http://localhost:8000
      BASE_URL_WEBHOOK: http://localhost:8100
      BASE_URL_FRONTEND: http://localhost:3000
      BASE_URL_FRONTEND_FINANCIAL: http://localhost:5173
      COOKIE_DOMAIN: localhost

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Ensure migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite
        run: python manage.py test
